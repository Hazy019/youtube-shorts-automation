name: Daily Hazy Chanel Factory

on:
  schedule:
    - cron: '30 10 * * *'   # 6:30 AM ET — renders 30min before 7:00 AM publish slot
    - cron: '30 22 * * *'   # 6:30 PM ET — renders 30min before 7:00 PM publish slot
  workflow_dispatch:

# Prevents minute waste if a manual re-run or workflow_dispatch fires during a live run
concurrency:
  group: hazy-factory
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # fetch-depth: 1 = shallow clone (latest commit only, skips full git history)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # setup-python@v5 has pip cache built-in — replaces the separate actions/cache step
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # Auth Tokens — one per YouTube account
      - name: Recreate Auth Tokens
        env:
          DRIVE_TOKEN:        ${{ secrets.DRIVE_TOKEN_JSON }}
          YOUTUBE_TOKEN_HAZY: ${{ secrets.TOKEN_YOUTUBE_HAZY }}
          YOUTUBE_TOKEN_US:   ${{ secrets.TOKEN_YOUTUBE_US }}
          CLIENT_SECRETS:     ${{ secrets.CLIENT_SECRETS_JSON }}
        run: |
          echo "$DRIVE_TOKEN"        > token_drive.json
          echo "$YOUTUBE_TOKEN_HAZY" > token_youtube_hazy.json
          echo "$YOUTUBE_TOKEN_US"   > token_youtube_us.json
          echo "$CLIENT_SECRETS"     > client_secrets.json

      # Environment
      - name: Create .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"             >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"                 >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"                 >> .env
          # ELEVENLABS_API_KEY removed — Edge-TTS is the sole TTS engine
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}"             >> .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}"           >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"       >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "BUCKET_NAME=${{ secrets.BUCKET_NAME }}"                   >> .env
          echo "SERVE_URL=${{ secrets.SERVE_URL }}"                       >> .env
          echo "SFX_FOLDER_ID=${{ secrets.SFX_FOLDER_ID }}"               >> .env
          echo "GENERAL_BGM_FOLDER_ID=${{ secrets.GENERAL_BGM_FOLDER_ID }}" >> .env
          echo "SCIENCE_BROLL_FOLDER_ID=${{ secrets.SCIENCE_BROLL_FOLDER_ID }}" >> .env
          echo "HISTORY_BROLL_FOLDER_ID=${{ secrets.HISTORY_BROLL_FOLDER_ID }}" >> .env
          echo "WEBHOOK_LOGS=${{ secrets.WEBHOOK_LOGS || secrets.DISCORD_WEBHOOK_URL }}"         >> .env
          echo "WEBHOOK_ERRORS=${{ secrets.WEBHOOK_ERRORS || secrets.DISCORD_WEBHOOK_URL }}"     >> .env
          echo "WEBHOOK_POSTS=${{ secrets.WEBHOOK_POSTS || secrets.DISCORD_WEBHOOK_URL }}"       >> .env
          echo "WEBHOOK_QUEUE=${{ secrets.WEBHOOK_QUEUE || secrets.DISCORD_WEBHOOK_URL }}"       >> .env
          echo "WEBHOOK_INSIGHTS=${{ secrets.WEBHOOK_INSIGHTS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "DISCORD_PING_USER_ID=${{ secrets.DISCORD_PING_USER_ID }}" >> .env
          echo "META_PAGE_ACCESS_TOKEN=${{ secrets.META_PAGE_ACCESS_TOKEN }}" >> .env
          echo "META_PAGE_ID=${{ secrets.META_PAGE_ID }}"                 >> .env
          echo "META_INSTAGRAM_ID=${{ secrets.META_INSTAGRAM_ID }}"       >> .env
          echo "FUNCTION_NAME=${{ secrets.FUNCTION_NAME }}"               >> .env
          echo "GITHUB_ACTIONS=true"                                       >> .env

      # Verify Secrets — pure bash, zero pip, runs in <1s
      - name: Verify Critical Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.GEMINI_API_KEY }}"          ] && MISSING+=("GEMINI_API_KEY")
          [ -z "${{ secrets.SUPABASE_URL }}"            ] && MISSING+=("SUPABASE_URL")
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}"       ] && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}"   ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.BUCKET_NAME }}"             ] && MISSING+=("BUCKET_NAME")
          [ -z "${{ secrets.SERVE_URL }}"               ] && MISSING+=("SERVE_URL")
          [ -z "${{ secrets.PEXELS_API_KEY }}"          ] && MISSING+=("PEXELS_API_KEY")
          [ -z "${{ secrets.TOKEN_YOUTUBE_HAZY }}"      ] && MISSING+=("TOKEN_YOUTUBE_HAZY")
          [ -z "${{ secrets.TOKEN_YOUTUBE_US }}"        ] && MISSING+=("TOKEN_YOUTUBE_US")
          [ -z "${{ secrets.DRIVE_TOKEN_JSON }}"        ] && MISSING+=("DRIVE_TOKEN_JSON")
          [ -z "${{ secrets.CLIENT_SECRETS_JSON }}"     ] && MISSING+=("CLIENT_SECRETS_JSON")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing critical secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All critical secrets present."

      # Verify ffmpeg — pre-installed on ubuntu-latest but confirm it's on PATH
      - name: Verify ffmpeg
        run: |
          echo "ffmpeg version:"
          ffmpeg -version | head -1
          echo "ffprobe version:"
          ffprobe -version | head -1

      # Dependencies — Edge-TTS only (no ElevenLabs), no pip upgrade needed
      - name: Install Python Requirements
        run: pip install -r requirements.txt

      # API Pre-flight — blocks factory if Pexels keys are dead (saves Gemini tokens)
      - name: Verify APIs (Pre-flight)
        run: python tools/verify_apis.py

      # Database Sanitation
      - name: Clean Ghost Records
        run: python tools/queue_manager.py clean-ghosts

      # Main Factory
      - name: Run Factory
        run: python run_factory.py