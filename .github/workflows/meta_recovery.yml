name: Daily Meta Recovery

on:
  schedule:
    - cron: '0 14 * * *'   # 10:00 AM ET (14:00 UTC)
    - cron: '0 4 * * *'    # 12:00 AM ET (04:00 UTC)
  workflow_dispatch:

concurrency:
  group: meta-recovery
  cancel-in-progress: true

jobs:
  meta-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # Environment
      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"                 >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"                 >> .env
          echo "META_PAGE_ACCESS_TOKEN=${{ secrets.META_PAGE_ACCESS_TOKEN }}" >> .env
          echo "META_PAGE_ID=${{ secrets.META_PAGE_ID }}"                 >> .env
          echo "META_INSTAGRAM_ID=${{ secrets.META_INSTAGRAM_ID }}"       >> .env
          echo "WEBHOOK_ERRORS=${{ secrets.WEBHOOK_ERRORS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "WEBHOOK_POSTS=${{ secrets.WEBHOOK_POSTS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "DISCORD_PING_USER_ID=${{ secrets.DISCORD_PING_USER_ID }}" >> .env
          echo "GITHUB_ACTIONS=true"                                       >> .env

      - name: Install Python Requirements
        run: pip install -r requirements.txt

      # Fail-fast: validate META_PAGE_ACCESS_TOKEN before wasting run minutes
      - name: Verify Meta Token (Pre-flight)
        run: python tools/verify_meta_token.py

      - name: Run Meta Recovery
        run: python -m src.utils.meta_healer
